set -g mouse on
set -g focus-events on

set-option -g default-terminal tmux-256color
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

# Dim inactive panes
setw -g window-style bg=colour238
setw -g window-active-style bg=black

set -g pane-border-style "fg=green,bg=colour238"
set -g pane-active-border-style "fg=green,bg=colour238"

# Keep tiled layout consistent across pane creation, destruction, and resize
set-hook -g after-split-window 'select-layout tiled'
set-hook -g after-kill-pane 'select-layout tiled'
set-hook -g after-resize-window 'select-layout tiled'

# Subtle status bar with active window highlighted
set -g status-style "bg=colour235,fg=colour252"
set -g window-status-current-style "bg=colour33,fg=colour231,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator "|"

# Auto-name windows from CC's pane title (the live session description CC sets via OSC)
set -g automatic-rename-format "#{pane_title}"
