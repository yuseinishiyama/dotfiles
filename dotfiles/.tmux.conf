set -g mouse on
set -g focus-events on

set-option -g default-terminal tmux-256color
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

set -g pane-border-style "fg=green,bg=colour238"
set -g pane-active-border-style "fg=green,bg=colour238"

# Skip kill-pane confirmation
bind x kill-pane

# Subtle status bar with active window highlighted
set -g status-style "bg=colour238,fg=colour252"
set -g window-status-current-style "bg=colour88,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator "|"

# Auto-name windows from whatever the program in the pane sets as its title via
# OSC 2. Fall back to the basename of the pane's cwd when no title is set,
# otherwise the tab reads " #I: ".
set -g automatic-rename-format "#{?pane_title,#{pane_title},#{b:pane_current_path}}"
