set -g mouse on
set -g focus-events on

set-option -g default-terminal tmux-256color
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

set -g pane-border-style "fg=green,bg=colour238"
set -g pane-active-border-style "fg=green,bg=colour238"

# Skip kill-pane confirmation
bind x kill-pane

# Subtle status bar with active window highlighted
set -g status-style "bg=colour238,fg=colour252"
set -g window-status-current-style "bg=colour88,bold"
set -g window-status-format "#{?#{window_bell_flag},#[bg=colour94],} #I:#W "
set -g window-status-current-format "#{?#{window_bell_flag},#[bg=colour94],} #I:#W "
set -g window-status-separator "|"

# Auto-name windows from whatever the program in the pane sets as its title via
# OSC 2. Strip a leading non-alphanumeric run plus space (e.g. CC's `✳ ` /
# `⠋ ` state chars) so the visible name doesn't repeat the bg-color signal.
# POSIX classes like [:alnum:] don't seem to work in tmux's regex here, so
# use explicit ASCII ranges. Fall back to the basename of the pane's cwd
# when no title is set.
set -g automatic-rename-format "#{?pane_title,#{s/^[^a-zA-Z0-9]+ //:pane_title},#{b:pane_current_path}}"

# Bell = "done, look here." External hooks (e.g. CC's stop and notification
# hooks) write BEL into a pane's tty when the program in that pane wants
# attention. tmux sets window_bell_flag, which the format above turns into
# a solid amber bg until the window is visited. Set bell-style to default
# (rather than the built-in "reverse") so it doesn't double-style on top
# of the format-applied bg.
set -g monitor-bell on
set -g visual-bell off
set -g window-status-bell-style default
