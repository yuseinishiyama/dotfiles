set -g mouse on
set -g focus-events on

set-option -g default-terminal tmux-256color
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

set -g pane-border-style "fg=green,bg=colour238"
set -g pane-active-border-style "fg=green,bg=colour238"

# Skip kill-pane confirmation
bind x kill-pane

# Status bar visual system. One channel per dimension:
#   - Selection (current window): bold + brighter fg
#   - Window with @cc_running tmux user-option set: pulsing green/dark-amber
#     bg (the option is set/cleared by external hooks; tmux doesn't care
#     who sets it).
#   - Window with bell flag set: solid dark-amber bg, text inherits style.
#     Dark enough that inherited light-gray / white text stays readable.
# Pulse and solid use the same dark-amber so finished and still-working
# windows share the bell color, distinguished by motion. status-interval
# drops to 1s so the pulse animates; rest of the bar redraws every
# second, which is fine.
#
# Implementation note: pulse logic lives in ~/.tmux/pulse.sh because
# tmux's #() parser doesn't treat its content as fully opaque — it
# scans for special chars like ( ) { } [ ]. Embedding the pulse logic
# inline in this format means literal #[bg=...] in the source breaks
# the parse. The script invocation #(~/.tmux/pulse.sh) is opaque to
# tmux's parser; the script's stdout is then re-interpreted as a
# style directive by the renderer. #() must live at format top level
# (not inside another #[...]), or its result is cached statically.
set -g status-interval 1
set -g status-style "bg=colour238,fg=colour252"
set -g window-status-current-style "fg=colour255,bold"
set -g window-status-format "#{?#{window_bell_flag},#[bg=colour94],#{?@cc_running,#(~/.tmux/pulse.sh),}} #I:#W "
set -g window-status-current-format "#{?#{window_bell_flag},#[bg=colour94],#{?@cc_running,#(~/.tmux/pulse.sh),}} #I:#W "
set -g window-status-separator "|"

# Auto-name windows from whatever the program in the pane sets as its title via
# OSC 2. Strip a leading non-alphanumeric run plus space (e.g. CC's `✳ ` /
# `⠋ ` state chars) so the visible name doesn't repeat the bg-color signal.
# POSIX classes like [:alnum:] don't seem to work in tmux's regex here, so
# use explicit ASCII ranges. Fall back to the basename of the pane's cwd
# when no title is set.
set -g automatic-rename-format "#{?pane_title,#{s/^[^a-zA-Z0-9]+ //:pane_title},#{b:pane_current_path}}"

# Bell = "done, look here." CC's stop-hook and notification-hook write BEL
# into the pane's tty on turn end and permission prompt. The format above
# applies the visible style; clear window-status-bell-style so tmux's
# `reverse` default doesn't layer on top of our format.
set -g monitor-bell on
set -g visual-bell off
set -g window-status-bell-style default
