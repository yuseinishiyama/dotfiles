set -g mouse on
set -g focus-events on

set-option -g default-terminal tmux-256color
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

set -g pane-border-style "fg=green,bg=colour238"
set -g pane-active-border-style "fg=green,bg=colour238"

# Skip kill-pane confirmation
bind x kill-pane

# Subtle status bar with active window highlighted
set -g status-style "bg=colour238,fg=colour252"
set -g window-status-current-style "bg=colour88,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator "|"

# Auto-name windows from CC's pane title (the live session description CC sets via OSC)
set -g automatic-rename-format "#{pane_title}"
